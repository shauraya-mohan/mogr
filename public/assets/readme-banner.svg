<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2C2419"/>
      <stop offset="60%" stop-color="#1B1610"/>
      <stop offset="100%" stop-color="#0C0B08"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4C48C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F4C48C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1EEE6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F1EEE6" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- bokeh, echoing the wardrobe "going out" scene motif -->
  <g fill="#C68A47">
    <circle cx="150" cy="40" r="3" opacity="0.55"/>
    <circle cx="330" cy="24" r="2" opacity="0.4"/>
    <circle cx="980" cy="46" r="3" opacity="0.5"/>
    <circle cx="1080" cy="30" r="2" opacity="0.35"/>
    <circle cx="60" cy="90" r="2" opacity="0.4"/>
    <circle cx="1150" cy="110" r="2.5" opacity="0.45"/>
  </g>

  <!-- the brand dot, with its bronze glow -->
  <circle cx="110" cy="132" r="80" fill="url(#glow)"/>
  <circle cx="110" cy="132" r="47" fill="none" stroke="#C68A47" stroke-width="1.5" opacity="0.3"/>
  <circle cx="110" cy="132" r="32" fill="#C68A47"/>
  <text x="110" y="200" text-anchor="middle" font-family="'Space Mono', ui-monospace, monospace" font-size="11" letter-spacing="2.5" fill="#B4AFA3">ONE BRONZE MOMENT</text>

  <!-- comb-tooth monoline, echoing the logo's teeth -->
  <g stroke="#C68A47" stroke-width="1.5" opacity="0.3">
    <line x1="8" y1="250" x2="8" y2="228"/><line x1="24" y1="250" x2="24" y2="236"/>
    <line x1="40" y1="250" x2="40" y2="222"/><line x1="56" y1="250" x2="56" y2="240"/>
    <line x1="72" y1="250" x2="72" y2="230"/><line x1="88" y1="250" x2="88" y2="238"/>
    <line x1="204" y1="250" x2="204" y2="234"/><line x1="220" y1="250" x2="220" y2="224"/>
    <line x1="236" y1="250" x2="236" y2="240"/><line x1="252" y1="250" x2="252" y2="230"/>
    <line x1="900" y1="250" x2="900" y2="232"/><line x1="916" y1="250" x2="916" y2="222"/>
    <line x1="932" y1="250" x2="932" y2="238"/><line x1="948" y1="250" x2="948" y2="226"/>
    <line x1="1104" y1="250" x2="1104" y2="236"/><line x1="1120" y1="250" x2="1120" y2="224"/>
    <line x1="1136" y1="250" x2="1136" y2="240"/><line x1="1152" y1="250" x2="1152" y2="228"/>
    <line x1="1168" y1="250" x2="1168" y2="234"/><line x1="1184" y1="250" x2="1184" y2="222"/>
  </g>

  <!-- four reads, one profile: the dashboard's own category cards -->
  <g font-family="'Space Mono', ui-monospace, monospace">
    <g>
      <rect x="290" y="82" width="196" height="96" rx="14" fill="url(#chip)" stroke="#F1EEE6" stroke-opacity="0.12"/>
      <circle cx="316" cy="110" r="4" fill="#C68A47"/>
      <text x="316" y="140" font-size="15" letter-spacing="1" fill="#F1EEE6">SKIN</text>
      <text x="316" y="160" font-size="10" letter-spacing="0.5" fill="#6E6A60">scan &amp; get your routine</text>
    </g>
    <g>
      <rect x="502" y="82" width="196" height="96" rx="14" fill="url(#chip)" stroke="#F1EEE6" stroke-opacity="0.12"/>
      <circle cx="528" cy="110" r="4" fill="#C68A47"/>
      <text x="528" y="140" font-size="15" letter-spacing="1" fill="#F1EEE6">HAIR</text>
      <text x="528" y="160" font-size="10" letter-spacing="0.5" fill="#6E6A60">try cuts on your face</text>
    </g>
    <g>
      <rect x="714" y="82" width="196" height="96" rx="14" fill="url(#chip)" stroke="#F1EEE6" stroke-opacity="0.12"/>
      <circle cx="740" cy="110" r="4" fill="#C68A47"/>
      <text x="740" y="140" font-size="15" letter-spacing="1" fill="#F1EEE6">FACIAL HAIR</text>
      <text x="740" y="160" font-size="10" letter-spacing="0.5" fill="#6E6A60">find your beard style</text>
    </g>
    <g>
      <rect x="926" y="82" width="196" height="96" rx="14" fill="url(#chip)" stroke="#F1EEE6" stroke-opacity="0.12"/>
      <circle cx="952" cy="110" r="4" fill="#C68A47"/>
      <text x="952" y="140" font-size="15" letter-spacing="1" fill="#F1EEE6">WARDROBE</text>
      <text x="952" y="160" font-size="10" letter-spacing="0.5" fill="#6E6A60">add items to style</text>
    </g>
  </g>
</svg>
